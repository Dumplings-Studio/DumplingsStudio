<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="icon" type="image/jpeg" href="images/ds-logo.jpeg"><title>Galaxy Defender</title><style>body{margin:0;background:#04070f;color:#e8f0ff;font-family:Segoe UI,Tahoma,sans-serif;display:grid;place-items:center;height:100vh}.wrap{width:min(95vw,860px)}canvas{width:100%;height:560px;background:radial-gradient(circle at 50% 20%,#1c2c58,#060a16);display:block;border-radius:12px;border:1px solid #2a3b69}.hud{display:flex;justify-content:space-between;margin:8px 2px}.exit{position:fixed;right:12px;top:12px;background:#d84b4b;color:#fff;text-decoration:none;padding:8px 12px;border-radius:8px;font-weight:700}</style></head><body><a class="exit" href="games.html">Exit</a><div class="wrap"><h1>Galaxy Defender</h1><div class="hud"><span>Score: <b id="score">0</b></span><span>Move: A/D or Arrows, Shoot: Space</span></div><canvas id="cv" width="840" height="560"></canvas></div><script>
const c=cv,x=c.getContext('2d'),s=document.getElementById('score');const p={x:420,y:510,w:34,h:24};const keys={};let bullets=[],en=[],stars=[],score=0,cool=0,spawn=0,alive=true;for(let i=0;i<120;i++)stars.push({x:Math.random()*c.width,y:Math.random()*c.height,sp:0.3+Math.random()*1.2});addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
function fire(){if(cool>0||!alive)return;cool=.16;bullets.push({x:p.x,y:p.y-14,v:9});}
function restart(){score=0;s.textContent=0;bullets=[];en=[];alive=true;p.x=420;}
addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();if(alive)fire();else restart();}});
function loop(){requestAnimationFrame(loop);for(const st of stars){st.y+=st.sp;if(st.y>c.height)st.y=0;}if(!alive){draw();return;}p.x+=((keys['arrowright']||keys['d'])?6:0)-((keys['arrowleft']||keys['a'])?6:0);p.x=Math.max(20,Math.min(c.width-20,p.x));cool=Math.max(0,cool-1/60);spawn-=1/60;if(spawn<=0){spawn=Math.max(.28,.85-score/1200);en.push({x:20+Math.random()*(c.width-40),y:-20,vy:1.6+Math.random()*2.4,r:14+Math.random()*12});}
for(const b of bullets)b.y-=b.v;bullets=bullets.filter(b=>b.y>-20);for(const e of en)e.y+=e.vy;
for(let i=en.length-1;i>=0;i--){const e=en[i];if(e.y>c.height+30){en.splice(i,1);continue;}if(Math.hypot(e.x-p.x,e.y-p.y)<e.r+14){alive=false;}for(let j=bullets.length-1;j>=0;j--){const b=bullets[j];if(Math.hypot(e.x-b.x,e.y-b.y)<e.r+4){en.splice(i,1);bullets.splice(j,1);score+=10;s.textContent=score;break;}}}
if(keys[' ']||keys['space'])fire();draw();}
function draw(){x.clearRect(0,0,c.width,c.height);for(const st of stars){x.fillStyle='rgba(220,235,255,.8)';x.fillRect(st.x,st.y,2,2);}for(const b of bullets){x.fillStyle='#9af7ff';x.fillRect(b.x-2,b.y-12,4,12);}for(const e of en){x.beginPath();x.fillStyle='#ff8a8a';x.arc(e.x,e.y,e.r,0,Math.PI*2);x.fill();}x.save();x.translate(p.x,p.y);x.fillStyle='#a6ddff';x.beginPath();x.moveTo(0,-16);x.lineTo(14,12);x.lineTo(0,6);x.lineTo(-14,12);x.closePath();x.fill();x.restore();if(!alive){x.fillStyle='rgba(0,0,0,.55)';x.fillRect(0,0,c.width,c.height);x.fillStyle='#fff';x.font='bold 46px Segoe UI';x.textAlign='center';x.fillText('Defeated',c.width/2,c.height/2-10);x.font='20px Segoe UI';x.fillText('Press Space to restart',c.width/2,c.height/2+30);}}
loop();
</script></body></html>
