<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/jpeg" href="images/ds-logo.jpeg">
  <title>Crystal Merge 2048</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top,#20293f,#0c1020 56%,#060811);font-family:Segoe UI,Tahoma,sans-serif;color:#eff5ff}
    .panel{width:min(94vw,560px)}
    h1{margin:4px 0 8px;text-align:center;letter-spacing:.05em;text-transform:uppercase}
    .hud{display:flex;justify-content:space-between;background:#131a2f;border:1px solid #314264;border-radius:10px;padding:10px 12px}
    .hint{text-align:center;opacity:.88;margin:8px 0 12px;font-size:.95rem}
    .board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;background:#101527;border:1px solid #2b3958;border-radius:14px;padding:12px}
    .cell{aspect-ratio:1/1;border-radius:10px;display:grid;place-items:center;font-size:1.7rem;font-weight:700;background:#1c243d;color:#e6f2ff}
    .v2{background:#20304e}.v4{background:#223d5f}.v8{background:#1a5f6f}.v16{background:#337267}.v32{background:#4f875a}
    .v64{background:#8c8348}.v128{background:#ae7d3d}.v256{background:#b86d3a}.v512{background:#bb5a51}.v1024{background:#a44f7c}.v2048{background:#7d58d2}
    .exit{position:fixed;right:12px;top:12px;background:#d84b4b;color:#fff;text-decoration:none;padding:8px 12px;border-radius:8px;font-weight:700}
  </style>
</head>
<body>
  <a class="exit" href="games.html">Exit</a>
  <div class="panel">
    <h1>Crystal Merge 2048</h1>
    <div class="hud">
      <div>Score: <b id="score">0</b></div>
      <div>Best: <b id="best">0</b></div>
    </div>
    <p class="hint">Use Arrow keys or WASD to merge matching crystals. Reach 2048. Press R to restart.</p>
    <div class="board" id="board"></div>
  </div>

  <script>
    const boardEl=document.getElementById('board');
    const scoreEl=document.getElementById('score');
    const bestEl=document.getElementById('best');
    const N=4;
    let grid,score,best=+localStorage.getItem('crystalBest')||0;
    bestEl.textContent=best;

    function init(){
      grid=Array.from({length:N},()=>Array(N).fill(0));
      score=0;
      spawn();spawn();
      draw();
    }

    function spawn(){
      const empty=[];
      for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(!grid[r][c])empty.push([r,c]);
      if(!empty.length)return;
      const [r,c]=empty[(Math.random()*empty.length)|0];
      grid[r][c]=Math.random()<0.9?2:4;
    }

    function slide(line){
      const arr=line.filter(v=>v);
      for(let i=0;i<arr.length-1;i++){
        if(arr[i]===arr[i+1]){arr[i]*=2;score+=arr[i];arr[i+1]=0;i++;}
      }
      const merged=arr.filter(v=>v);
      while(merged.length<N)merged.push(0);
      return merged;
    }

    function move(dir){
      const before=JSON.stringify(grid);

      if(dir==='left'){
        for(let r=0;r<N;r++)grid[r]=slide(grid[r]);
      }
      if(dir==='right'){
        for(let r=0;r<N;r++)grid[r]=slide([...grid[r]].reverse()).reverse();
      }
      if(dir==='up'){
        for(let c=0;c<N;c++){
          const col=slide(grid.map(row=>row[c]));
          for(let r=0;r<N;r++)grid[r][c]=col[r];
        }
      }
      if(dir==='down'){
        for(let c=0;c<N;c++){
          const col=slide(grid.map(row=>row[c]).reverse()).reverse();
          for(let r=0;r<N;r++)grid[r][c]=col[r];
        }
      }

      if(JSON.stringify(grid)!==before){
        spawn();
        if(score>best){best=score;localStorage.setItem('crystalBest',best);}
        draw();
        if(checkLose())setTimeout(()=>alert('No moves left. Press R to restart.'),40);
      }
    }

    function checkLose(){
      for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(grid[r][c]===0)return false;
      for(let r=0;r<N;r++)for(let c=0;c<N-1;c++)if(grid[r][c]===grid[r][c+1])return false;
      for(let c=0;c<N;c++)for(let r=0;r<N-1;r++)if(grid[r][c]===grid[r+1][c])return false;
      return true;
    }

    function draw(){
      boardEl.innerHTML='';
      for(let r=0;r<N;r++)for(let c=0;c<N;c++){
        const v=grid[r][c];
        const d=document.createElement('div');
        d.className='cell'+(v?(' v'+v):'');
        d.textContent=v||'';
        boardEl.appendChild(d);
      }
      scoreEl.textContent=score;
      bestEl.textContent=best;
    }

    addEventListener('keydown',e=>{
      const k=e.key.toLowerCase();
      if(k==='arrowleft'||k==='a')move('left');
      if(k==='arrowright'||k==='d')move('right');
      if(k==='arrowup'||k==='w')move('up');
      if(k==='arrowdown'||k==='s')move('down');
      if(k==='r')init();
    });

    init();
  </script>
</body>
</html>
